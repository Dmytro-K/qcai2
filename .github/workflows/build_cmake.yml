name: Build plugin

on:
  push:
    branches-ignore:
      - tmp
      - 'tmp/**'
    tags:
      - 'v*'
  pull_request:

env:
  PLUGIN_NAME: qcai2
  QT_VERSION: 6.10.2
  QT_CREATOR_VERSION: 19.0.0
  MACOS_DEPLOYMENT_TARGET: "11.0"
  CMAKE_VERSION: "3.29.6"
  NINJA_VERSION: "1.12.1"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}
    outputs:
        tag: ${{ steps.git.outputs.tag }}
        artifact_version: ${{ steps.git.outputs.artifact_version }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {
              name: "Windows Latest MSVC", artifact: "Windows-x64",
              os: windows-latest,
              platform: windows_x64,
              archive_ext: zip,
              cc: "cl", cxx: "cl", msvc_arch: "x64",
              vcpkg_triplet: "x64-windows-static-md",
              qt_host: "windows", qt_arch: "win64_msvc2022_64",
              qt_archives: "qtbase qtdeclarative qt5compat qtshadertools",
            }
          - {
               name: "Windows Latest MSVC Arm64", artifact: "Windows-arm64",
               os: windows-11-arm,
               platform: windows_arm64,
              archive_ext: zip,
              cc: "cl", cxx: "cl", msvc_arch: "arm64",
              vcpkg_triplet: "arm64-windows-static-md",
              qt_host: "windows_arm64", qt_arch: "win64_msvc2022_arm64",
              qt_archives: "qtbase qtdeclarative qt5compat qtshadertools",
            }
          - {
              name: "Ubuntu Latest GCC", artifact: "Linux-x64",
              os: ubuntu-latest,
              platform: linux_x64,
             archive_ext: tar.xz,
             cc: "gcc", cxx: "g++",
             qt_host: "linux", qt_arch: "linux_gcc_64",
             qt_archives: "qtbase qtdeclarative qt5compat qtshadertools icu"
           }
          - {
              name: "Ubuntu Latest GCC Arm64", artifact: "Linux-arm64",
              os: ubuntu-24.04-arm,
              platform: linux_arm64,
             archive_ext: tar.xz,
             cc: "gcc", cxx: "g++",
             qt_host: "linux_arm64", qt_arch: "linux_gcc_arm64",
             qt_archives: "qtbase qtdeclarative qt5compat qtshadertools icu"
           }
          - {
              name: "macOS Latest Clang", artifact: "macOS-universal",
              os: macos-latest,
              platform: mac_x64,
             archive_ext: zip,
             cc: "clang", cxx: "clang++",
             qt_host: "mac", qt_arch: "clang_64",
              qt_archives: "qtbase qtdeclarative qt5compat qtshadertools",
           }

    steps:
    - uses: actions/checkout@v4
    - name: Resolve build metadata
      id: git
      shell: cmake -P {0}
      run: |
        set(qcai2_workspace "$ENV{GITHUB_WORKSPACE}")
        if(qcai2_workspace STREQUAL "")
          message(FATAL_ERROR "GITHUB_WORKSPACE is empty.")
        endif()
        file(TO_CMAKE_PATH "${qcai2_workspace}" qcai2_workspace)

        set(qcai2_github_ref "$ENV{GITHUB_REF}")
        set(qcai2_github_sha "$ENV{GITHUB_SHA}")
        set(qcai2_github_run_id "$ENV{GITHUB_RUN_ID}")

        file(STRINGS "${qcai2_workspace}/VERSION.txt" qcai2_version_lines
          REGEX "^[ \t]*[^# \t].*$")
        list(GET qcai2_version_lines 0 qcai2_version_raw)
        string(STRIP "${qcai2_version_raw}" qcai2_version_full)

        if(NOT qcai2_version_full MATCHES "^([0-9]+\\.[0-9]+\\.[0-9]+)(-[0-9]+)$")
          message(FATAL_ERROR
            "VERSION.txt must contain a revision like 0.0.4-002, got: ${qcai2_version_full}")
        endif()

        set(qcai2_short_sha "${qcai2_github_sha}")
        if(NOT qcai2_short_sha STREQUAL "")
          string(SUBSTRING "${qcai2_short_sha}" 0 8 qcai2_short_sha)
        endif()

        set(qcai2_artifact_version "${qcai2_version_full}")
        if(NOT qcai2_github_ref MATCHES "^refs/tags/v")
          if(qcai2_short_sha STREQUAL "")
            message(FATAL_ERROR "GITHUB_SHA is empty for a non-release build.")
          endif()
          set(qcai2_artifact_version "${qcai2_version_full}-g${qcai2_short_sha}")
        endif()

        if(qcai2_github_ref MATCHES "^refs/tags/v(.*)")
            file(APPEND "$ENV{GITHUB_OUTPUT}" "tag=${CMAKE_MATCH_1}\n")
        else()
            file(APPEND "$ENV{GITHUB_OUTPUT}" "tag=${qcai2_github_run_id}\n")
        endif()
        file(APPEND "$ENV{GITHUB_OUTPUT}" "version_full=${qcai2_version_full}\n")
        file(APPEND "$ENV{GITHUB_OUTPUT}" "artifact_version=${qcai2_artifact_version}\n")

    - name: Download Ninja and CMake
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: ${{ env.CMAKE_VERSION }}
        ninjaVersion: ${{ env.NINJA_VERSION }}

    - name: Install system libs
      shell: cmake -P {0}
      run: |
        if ("${{ matrix.config.platform }}" MATCHES "linux")
          execute_process(
            COMMAND sudo apt-get update
          )
          execute_process(
            COMMAND sudo apt-get install -y libgl1-mesa-dev liblzma-dev libsecret-1-0
            RESULT_VARIABLE result
          )
          if (NOT result EQUAL 0)
            message(FATAL_ERROR "Failed to install dependencies")
          endif()
        endif()

    - name: Install macOS libs
      if: runner.os == 'macOS'
      run: brew install xz

    - name: Install Qt
      id: qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ env.QT_VERSION }}
        host: ${{ matrix.config.qt_host }}
        target: desktop
        arch: ${{ matrix.config.qt_arch }}
        archives: ${{ matrix.config.qt_archives }}
        modules: qtnetworkauth qtscxml
        dir: ${{ github.workspace }}/qt
        cache: true

    - name: Verify Qt modules
      shell: bash
      run: |
        set -euo pipefail
        if [ -z "${QT_ROOT_DIR:-}" ]; then
          echo "::error::QT_ROOT_DIR is not set after install-qt-action"
          exit 1
        fi

        networkauth_config="$(
          find "${QT_ROOT_DIR}" \
            \( -path '*/Qt6NetworkAuth/Qt6NetworkAuthConfig.cmake' \
               -o -path '*/Qt5NetworkAuth/Qt5NetworkAuthConfig.cmake' \) \
            -print -quit
        )"
        if [ -z "${networkauth_config}" ]; then
          echo "::error::Qt NetworkAuth was not installed under ${QT_ROOT_DIR}"
          exit 1
        fi

        statemachine_config="$(
          find "${QT_ROOT_DIR}" \
            -path '*/Qt6StateMachine/Qt6StateMachineConfig.cmake' \
            -print -quit
        )"
        if [ -z "${statemachine_config}" ]; then
          echo "::error::Qt StateMachine was not installed under ${QT_ROOT_DIR}"
          exit 1
        fi

        echo "Using Qt NetworkAuth config ${networkauth_config}"
        echo "Using Qt StateMachine config ${statemachine_config}"

    - name: Download Qt Creator
      id: qt_creator
      uses: qt-creator/install-dev-package@v2.1
      with:
        version: ${{ env.QT_CREATOR_VERSION }}
        unzip-to: 'qtcreator'
        platform: ${{ matrix.config.platform }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup MSVC environment
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.config.msvc_arch }}

    - name: Install Windows libs
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $vcpkgRoot = Join-Path $env:RUNNER_TEMP 'vcpkg'
        git clone --depth 1 https://github.com/microsoft/vcpkg.git $vcpkgRoot
        & (Join-Path $vcpkgRoot 'bootstrap-vcpkg.bat') -disableMetrics
        & (Join-Path $vcpkgRoot 'vcpkg.exe') install "liblzma:${{ matrix.config.vcpkg_triplet }}"
        "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "VCPKG_TARGET_TRIPLET=${{ matrix.config.vcpkg_triplet }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build, test, and package
      shell: bash
      env:
        CC: ${{ matrix.config.cc }}
        CXX: ${{ matrix.config.cxx }}
        MACOSX_DEPLOYMENT_TARGET: ${{ env.MACOS_DEPLOYMENT_TARGET }}
      run: |
        set -euo pipefail

        export NINJA_STATUS='[%f/%t %o/sec] '

        if [ -z "${QT_ROOT_DIR:-}" ]; then
          echo "::error::QT_ROOT_DIR is not set after install-qt-action"
          exit 1
        fi
        qt_prefix="${QT_ROOT_DIR}"
        echo "Using Qt prefix ${qt_prefix}"
        if [ "${{ runner.os }}" = "Linux" ]; then
          export LD_LIBRARY_PATH="${qt_prefix}/lib${LD_LIBRARY_PATH:+:${LD_LIBRARY_PATH}}"
        fi

        qtcreator_config="$(
          find "${{ steps.qt_creator.outputs.path }}" \
            \( -name QtCreatorConfig.cmake -o -name qtcreator-config.cmake \) \
            -print -quit
        )"
        if [ -z "${qtcreator_config}" ]; then
          echo "::error::Unable to locate QtCreatorConfig.cmake under ${{ steps.qt_creator.outputs.path }}"
          exit 1
        fi
        qtcreator_dir="$(dirname "${qtcreator_config}")"
        echo "Using QtCreator_DIR=${qtcreator_dir}"

        qt6_config="$(
          find "${qt_prefix}" \
            \( -name Qt6Config.cmake -o -name qt6-config.cmake \) \
            -print -quit
        )"
        if [ -z "${qt6_config}" ]; then
          echo "::error::Unable to locate Qt6Config.cmake under ${qt_prefix}"
          exit 1
        fi
        qt6_dir="$(dirname "${qt6_config}")"
        echo "Using Qt6_DIR=${qt6_dir}"

        qtc_prefix_path="${qt_prefix};${{ steps.qt_creator.outputs.path }}"
        windows_test_path=

        if [ "${RUNNER_OS}" = "Windows" ]; then
          git_bin_dir="$(dirname "$(command -v git)")"
          git_root=
          if [ "${git_bin_dir}" = "/usr/bin" ]; then
            git_root="/"
          elif [ "${git_bin_dir}" = "/cmd" ]; then
            git_root="/"
          elif [ "${git_bin_dir}" = "/bin" ]; then
            git_root="/"
          elif [[ "${git_bin_dir}" == */usr/bin ]]; then
            git_root="${git_bin_dir%/usr/bin}"
          elif [[ "${git_bin_dir}" == */cmd ]]; then
            git_root="${git_bin_dir%/cmd}"
          elif [[ "${git_bin_dir}" == */bin ]]; then
            git_root="${git_bin_dir%/bin}"
          fi
          if [ -z "${git_root}" ]; then
            echo "::warning::Could not determine Git root from ${git_bin_dir}; falling back to inherited PATH only."
          fi
          windows_qt_prefix="$(cygpath -u "${qt_prefix}")"
          windows_qtcreator_path="$(cd "${{ steps.qt_creator.outputs.path }}" && pwd)"
          windows_qt_bin="$(cygpath -w "${windows_qt_prefix}/bin")"
          windows_qtcreator_bin="$(cygpath -w "${windows_qtcreator_path}/bin")"
          windows_qtcreator_lib="$(cygpath -w "${windows_qtcreator_path}/lib/qtcreator")"
          windows_inherited_path="$(cygpath -wp "${PATH}")"
          windows_git_path=
          for candidate in "${git_root}/cmd" "${git_root}/bin" "${git_root}/usr/bin"; do
            if [ -n "${git_root}" ] && [ -d "${candidate}" ]; then
              candidate_win="$(cygpath -w "${candidate}")"
              if [ -z "${windows_git_path}" ]; then
                windows_git_path="${candidate_win}"
              else
                windows_git_path="${windows_git_path};${candidate_win}"
              fi
            fi
          done
          if [ -n "${windows_git_path}" ]; then
            windows_test_path="${windows_qt_bin};${windows_qtcreator_bin};${windows_qtcreator_lib};${windows_git_path};${windows_inherited_path}"
          else
            windows_test_path="${windows_qt_bin};${windows_qtcreator_bin};${windows_qtcreator_lib};${windows_inherited_path}"
          fi
          echo "Using Windows test PATH additions: ${windows_qt_bin} ; ${windows_qtcreator_bin} ; ${windows_qtcreator_lib} ; ${windows_git_path}"
        fi

        cmake_args=(
          -S .
          -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DWITH_TESTS=ON
          "-DCMAKE_PREFIX_PATH=${qtc_prefix_path}"
          "-DQtCreator_DIR=${qtcreator_dir}"
          "-DQt6_DIR=${qt6_dir}"
        )

        if [ "${RUNNER_OS}" = "macOS" ]; then
          cmake_args+=("-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64")
        fi

        if [ "${RUNNER_OS}" = "Windows" ]; then
          cmake_args+=("-DCMAKE_TOOLCHAIN_FILE=${VCPKG_ROOT}/scripts/buildsystems/vcpkg.cmake")
          cmake_args+=("-DVCPKG_TARGET_TRIPLET=${VCPKG_TARGET_TRIPLET}")
        fi

        cmake "${cmake_args[@]}"
        cmake --build build --parallel
        if [ "${RUNNER_OS}" = "Linux" ]; then
          QT_QPA_PLATFORM=offscreen ctest --test-dir build --output-on-failure
        elif [ "${RUNNER_OS}" = "Windows" ]; then
          if ! cmake -E env "PATH=${windows_test_path}" ctest --test-dir build --output-on-failure; then
            if [ -f build/Testing/Temporary/LastTestsFailed.log ]; then
              echo "----- build/Testing/Temporary/LastTestsFailed.log -----"
              cat build/Testing/Temporary/LastTestsFailed.log
            fi
            if [ -f build/Testing/Temporary/LastTest.log ]; then
              echo "----- build/Testing/Temporary/LastTest.log -----"
              cat build/Testing/Temporary/LastTest.log
            fi
            echo "----- ctest --rerun-failed -VV -----"
            cmake -E env "PATH=${windows_test_path}" ctest --test-dir build --rerun-failed -VV \
              --output-on-failure || true
            if [ -f build/Testing/Temporary/LastTestsFailed.log ] && grep -q 'qcai2_file_tools' build/Testing/Temporary/LastTestsFailed.log; then
              echo "----- direct qcai2_file_tools rerun -----"
              echo "Windows test PATH: ${windows_test_path}"
              type -a git || true
              git --version || true
              cmake -E env "PATH=${windows_test_path}" "QCAI2_FILE_TOOLS_DEBUG=1" \
                build/src/tests/tst_qcai2_file_tools.exe -v2 || true
            fi
            exit 1
          fi
        else
          ctest --test-dir build --output-on-failure
        fi

        package_root="$PWD/package-root"
        archive_name="${PLUGIN_NAME}-${{ steps.git.outputs.artifact_version }}-qtcreator-${QT_CREATOR_VERSION}-${{ matrix.config.artifact }}.${{ matrix.config.archive_ext }}"

        rm -rf "$package_root"
        cmake --install build --prefix "$package_root"
        if [ "${{ matrix.config.archive_ext }}" = "tar.xz" ]; then
          tar -C "$PWD" -cf - package-root | xz -9 -T0 > "$archive_name"
        else
          cmake -E tar cf "$archive_name" --format=zip package-root
        fi

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        path: ./${{ env.PLUGIN_NAME }}-${{ steps.git.outputs.artifact_version }}-qtcreator-${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.artifact }}.${{ matrix.config.archive_ext }}
        name: ${{ env.PLUGIN_NAME}}-${{ steps.git.outputs.artifact_version }}-qtcreator-${{ env.QT_CREATOR_VERSION }}-${{ matrix.config.artifact }}.${{ matrix.config.archive_ext }}


  release:
    if: contains(github.ref, 'tags/v')
    runs-on: ubuntu-latest
    needs: [build]

    steps:
    - uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-with-dirs

    - name: Fixup artifacts
      run: |
        mkdir release
        mv release-with-dirs/*/* release/

    - name: Extract release notes
      shell: bash
      run: |
        set -euo pipefail
        python3 - <<'PY'
        from pathlib import Path
        import re
        import sys

        changelog_path = Path("CHANGELOG.md")
        if not changelog_path.exists():
            print("::error::CHANGELOG.md not found", file=sys.stderr)
            raise SystemExit(1)

        lines = changelog_path.read_text(encoding="utf-8").splitlines()
        version_heading = re.compile(r"^## \[(?!Unreleased\])[^]]+\]")

        start = None
        end = len(lines)
        for index, line in enumerate(lines):
            if version_heading.match(line):
                start = index + 1
                break

        if start is None:
            print("::error::No released version entry found in CHANGELOG.md", file=sys.stderr)
            raise SystemExit(1)

        for index in range(start, len(lines)):
            if version_heading.match(lines[index]):
                end = index
                break

        release_notes = "\n".join(lines[start:end]).strip()
        if not release_notes:
            print("::error::Latest CHANGELOG.md version entry is empty", file=sys.stderr)
            raise SystemExit(1)

        Path("release-notes.md").write_text(release_notes + "\n", encoding="utf-8")
        PY

    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ needs.build.outputs.tag }}
        body_path: release-notes.md
        files: |
          release/*
        draft: false
        prerelease: false
